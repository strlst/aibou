<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>相棒 · Aibou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&family=Noto+Sans+JP:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* near-pure black base */
            --bg: #06060a;
            --bg2: #0a0a10;
            --surface: rgba(255, 255, 255, 0.035);
            --surface-hi: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.07);
            --border-hi: rgba(255, 255, 255, 0.12);

            /* blue accent family */
            --blue: #3d8ef8;
            --blue-dim: rgba(61, 142, 248, 0.15);

            /* text */
            --text: #e8e8f0;
            --text-muted: #8e8ea8;
            --text-dim: #68687a;

            /* bubbles */
            --user-bg: rgba(61, 142, 248, 0.09);
            --user-border: rgba(61, 142, 248, 0.2);
            --ai-bg: rgba(255, 255, 255, 0.028);
            --ai-border: rgba(255, 255, 255, 0.065);

            --radius-in: 24px;
            --radius-lg: 18px;
            --radius-md: 11px;
            --radius-sm: 8px;

            --font-ui: 'Noto Sans JP', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-head: 'Instrument Serif', serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            overflow: hidden;
        }

        /* faint noise grain for depth */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.022;
            pointer-events: none;
            z-index: 0;
        }

        /* blue bloom from top */
        body::after {
            content: '';
            position: fixed;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse at 50% 0%, rgba(61, 142, 248, 0.06) 0%, transparent 68%);
            pointer-events: none;
            z-index: 0;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: center;
            position: relative;
        }

        /* ── think panel ──────────────────────────── */
        .think-panel {
            display: flex;
            flex-direction: column;
            width: min(300px, 32vw);
            height: 100dvh;
            border-right: 1px solid var(--border);
            background: var(--bg2);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        /* ── chat panel ───────────────────────────── */
        .shell {
            display: flex;
            flex-direction: column;
            width: min(660px, 66vw);
            height: 100dvh;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        /* thin blue accent line across the top of the chat panel */
        .shell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(61, 142, 248, 0.5) 50%, transparent 100%);
            pointer-events: none;
        }

        /* ── headers ──────────────────────────────── */
        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* icon replacing the glowing dot — no border, just the svg itself */
        .header-icon {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            color: var(--blue);
        }

        .panel-header h1 {
            font-family: var(--font-head);
            font-size: 15px;
            font-weight: 400;
            font-style: normal;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .panel-header h1 .sub {
            font-style: normal;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 5px;
            font-weight: 300;
        }

        .model-tag {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.03em;
        }

        #clear-history {
            display: flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: var(--font-ui);
            font-size: 10px;
            padding: 4px 9px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            margin-left: 10px;
            flex-shrink: 0;
        }

        #clear-history:hover {
            border-color: rgba(220, 80, 80, 0.4);
            color: rgba(220, 100, 100, 0.9);
        }

        #clear-history svg {
            width: 11px;
            height: 11px;
        }

        /* ── messages ─────────────────────────────── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar {
            width: 3px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border-hi);
            border-radius: 2px;
        }

        .msg {
            display: flex;
            gap: 10px;
            animation: fadeUp .24s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 26px;
            height: 26px;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            display: grid;
            place-items: center;
            font-size: 9.5px;
            font-weight: 500;
            font-family: var(--font-mono);
            align-self: flex-end;
            letter-spacing: 0.03em;
        }

        .msg.user .avatar {
            background: var(--blue-dim);
            border: 1px solid rgba(61, 142, 248, 0.25);
            color: var(--blue);
        }

        .msg.ai .avatar {
            background: var(--surface-hi);
            border: 1px solid var(--border-hi);
            color: var(--text-muted);
        }

        /* frosted glass bubble */
        .bubble {
            max-width: 80%;
            padding: 11px 15px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            line-height: 1.72;
            white-space: pre-wrap;
            word-break: break-word;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .msg.user .bubble {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 5px;
        }

        .msg.ai .bubble {
            background: var(--ai-bg);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 5px;
        }

        /* typing dots */
        .typing .bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 16px;
        }

        .typing .bubble span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: blink 1.3s ease-in-out infinite;
        }

        .typing .bubble span:nth-child(2) {
            animation-delay: .18s;
        }

        .typing .bubble span:nth-child(3) {
            animation-delay: .36s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: .15;
                transform: scale(.75);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── empty state ──────────────────────────── */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: none;
        }

        .empty-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
        }

        .empty-icon svg {
            width: 20px;
            height: 20px;
            color: var(--text-dim);
        }

        .empty p {
            font-family: var(--font-mono);
            font-size: 11.5px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* ── input bar ────────────────────────────── */
        .input-bar {
            padding: 12px 20px 18px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
            /* gradient fade so messages scroll under it cleanly */
            background: linear-gradient(to top, var(--bg) 55%, transparent);
        }

        /* textarea + mic wrapped in one bordered pill */
        .input-wrap {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-in);
            transition: border-color .18s, background .18s;
        }

        .input-wrap:focus-within {
            border-color: rgba(61, 142, 248, 0.32);
            background: var(--surface-hi);
        }

        textarea {
            flex: 1;
            resize: none;
            overflow-y: auto;
            background: transparent;
            color: var(--text);
            border: none;
            padding: 11px 14px;
            font: 14px/1.65 var(--font-ui);
            max-height: 140px;
            min-height: 42px;
            outline: none;
        }

        textarea::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        button#mic {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            margin: 3px 4px 4px 0;
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-lg);
            cursor: pointer;
            background: var(--surface);
            color: #8888aa;
            display: grid;
            place-items: center;
            transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
        }

        button#mic:hover {
            background: var(--surface-hi);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        button#mic svg {
            width: 16px;
            height: 16px;
        }

        button#mic.recording {
            color: #f87171;
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.45);
            animation: micPulse 1.4s ease-in-out infinite;
        }

        @keyframes micPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(248, 113, 113, 0);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(248, 113, 113, 0.15);
            }
        }

        button#mic:disabled {
            opacity: .3;
            cursor: not-allowed;
        }

        button#send {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            background: var(--blue);
            color: #fff;
            display: grid;
            place-items: center;
            transition: opacity .15s, transform .12s;
            align-self: center;
        }

        button#send:hover {
            opacity: .85;
        }

        button#send:active {
            transform: scale(.92);
        }

        button#send:disabled {
            opacity: .2;
            cursor: not-allowed;
            transform: none;
        }

        button#send svg {
            width: 14px;
            height: 14px;
        }

        /* ── think log ────────────────────────────── */
        #think-log {
            flex: 1;
            overflow-y: auto;
            padding: 14px 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #think-log::-webkit-scrollbar {
            width: 2px;
        }

        #think-log::-webkit-scrollbar-track {
            background: transparent;
        }

        #think-log::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .think-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        .think-empty svg {
            width: 22px;
            height: 22px;
            color: var(--text-dim);
        }

        .think-empty p {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .think-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadeUp .2s ease both;
        }

        .think-turn-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: rgba(61, 142, 248, 0.38);
            letter-spacing: .1em;
            text-transform: uppercase;
            padding-left: 2px;
            margin-bottom: 2px;
        }

        .think-entries {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .think-entry {
            display: flex;
            gap: 7px;
            align-items: flex-start;
            padding: 5px 8px;
            border-radius: 6px;
            border-left: 1.5px solid transparent;
            transition: background .15s;
        }

        .think-entry:hover {
            background: rgba(255, 255, 255, .018);
        }

        .think-entry.info {
            border-left-color: var(--border-hi);
        }

        .think-entry.active {
            border-left-color: rgba(61, 142, 248, 0.45);
        }

        .think-entry.done {
            border-left-color: rgba(74, 222, 128, 0.18);
        }

        .think-icon {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
            margin-top: 2px;
            width: 12px;
            text-align: center;
        }

        .think-entry.active .think-icon {
            color: var(--blue);
        }

        .think-entry.done .think-icon {
            color: rgba(74, 222, 128, 0.45);
        }

        .think-text {
            font-family: var(--font-mono);
            font-size: 11px;
            font-style: normal;
            color: #3a3a52;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .think-entry.active .think-text {
            color: #484860;
        }

        .think-entry.done .think-text {
            color: var(--text-dim);
        }

        .think-cursor {
            display: inline-block;
            width: 1px;
            height: 10px;
            background: var(--blue);
            margin-left: 2px;
            vertical-align: middle;
            animation: cur .75s step-end infinite;
        }

        @keyframes cur {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- thinking panel (left) -->
    <div class="think-panel">
        <div class="panel-header">
            <div class="header-icon">
                <!-- gemini-style 4-pointed sparkle -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2 C12 2 13.2 8.8 16 12 C13.2 15.2 12 22 12 22 C12 22 10.8 15.2 8 12 C10.8 8.8 12 2 12 2Z M2 12 C2 12 8.8 10.8 12 8 C15.2 10.8 22 12 22 12 C22 12 15.2 13.2 12 16 C8.8 13.2 2 12 2 12Z" />
                </svg>
            </div>
            <h1>考え<span class="sub">/ thinking</span></h1>
        </div>
        <div id="think-log">
            <div class="think-empty" id="think-empty">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <p>思考なし</p>
            </div>
        </div>
    </div>

    <!-- chat panel (right) -->
    <div class="shell">
        <div class="panel-header">
            <div class="header-icon">
                <!-- gemini-style 4-pointed sparkle -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2 C12 2 13.2 8.8 16 12 C13.2 15.2 12 22 12 22 C12 22 10.8 15.2 8 12 C10.8 8.8 12 2 12 2Z M2 12 C2 12 8.8 10.8 12 8 C15.2 10.8 22 12 22 12 C22 12 15.2 13.2 12 16 C8.8 13.2 2 12 2 12Z" />
                </svg>
            </div>
            <h1>相棒<span class="sub">/ aibou</span></h1>
            <span class="model-tag">{{ chat_model }} · {{ chat_provider }}</span>
            <button id="clear-history" title="履歴を削除">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14H6L5 6" />
                    <path d="M10 11v6M14 11v6M9 6V4h6v2" />
                </svg>
                履歴削除
            </button>
        </div>

        <div id="messages">
            <div class="empty" id="empty">
                <div class="empty-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                </div>
                <p>{{ localization_info_start }}</p>
            </div>
        </div>

        <div class="input-bar">
            <div class="input-wrap">
                <textarea id="input" rows="1" placeholder="{{ localization_info_please_type }}"
                    autocomplete="off"></textarea>
                <button id="mic" title="録音">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="2" width="6" height="12" rx="3" />
                        <path d="M5 10a7 7 0 0 0 14 0" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                        <line x1="9" y1="22" x2="15" y2="22" />
                    </svg>
                </button>
            </div>
            <button id="send" title="送信">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='chat.js') }}" defer></script>
</body>

</html>
